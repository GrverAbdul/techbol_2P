{% extends "base.html" %}

{% block content %}
<h2>Editar Producto</h2>

<form method="POST">

    <input class="form-control mb-2" type="text" name="nombre" value="{{ producto.nombre }}">

    <input class="form-control mb-2" type="number" step="0.01" name="precio" value="{{ producto.precio }}">

    <input class="form-control mb-2" type="number" name="stock" value="{{ producto.stock }}">

    <button class="btn btn-success">Actualizar</button>
</form>

{% endblock %}
