{% extends "base.html" %}

{% block content %}
<h2>Productos</h2>

<a class="btn btn-primary mb-2" href="/productos/create">Nuevo producto</a>

<table class="table table-bordered">
    <tr>
        <th>Nombre</th>
        <th>Precio</th>
        <th>Stock</th>
        <th>Acciones</th>
    </tr>

    {% for p in productos %}
    <tr>
        <td>{{ p.nombre }}</td>
        <td>{{ p.precio }}</td>
        <td>{{ p.stock }}</td>
        <td>
            <a class="btn btn-warning btn-sm" href="/productos/edit/{{p.id}}">Editar</a>
            <a class="btn btn-danger btn-sm" href="/productos/delete/{{p.id}}"
            onclick="return confirm('¿Seguro que deseas eliminar este registro?')">Eliminar</a>
        </td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
