{% extends "base.html" %}

{% block content %}
<h2>Editar Pedido</h2>

<form method="POST">

    <input class="form-control mb-2"
           type="date"
           name="fecha"
           value="{{ pedido.fecha }}"
           placeholder="fecha">

    <input class="form-control mb-2"
           type="number"
           step="0.01"
           name="monto"
           value="{{ pedido.monto }}"
           placeholder="monto">

    <label>Cliente</label>
    <select class="form-control mb-2" name="cliente_id">

        {% for c in clientes %}
            <option value="{{ c.id }}"
                {% if c.id == pedido.cliente_id %}selected{% endif %}>
                {{ c.nombre }}
            </option>
        {% endfor %}

    </select>

    <label>Producto</label>
    <select class="form-control mb-2" name="producto_id">

        {% for p in productos %}
            <option value="{{ p.id }}"
                {% if p.id == pedido.producto_id %}selected{% endif %}>
                {{ p.nombre }}
            </option>
        {% endfor %}

    </select>

    <button class="btn btn-success">Actualizar</button>

</form>

{% endblock %}
